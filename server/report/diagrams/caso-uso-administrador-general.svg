<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .frame { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .stroke { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 3; rx: 14; ry: 14; }
      .text { fill: #111827; font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 600; }
      .text-small { fill: #111827; font-family: "Segoe UI", Arial, sans-serif; font-size: 20px; font-weight: 600; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Border -->
  <rect class="frame" x="20" y="20" width="1160" height="480" rx="10" ry="10"/>

  <!-- Actor -->
  <circle class="stroke" cx="120" cy="140" r="24"/>
  <line class="stroke" x1="120" y1="164" x2="120" y2="250"/>
  <line class="stroke" x1="80" y1="195" x2="160" y2="195"/>
  <line class="stroke" x1="120" y1="250" x2="90" y2="315"/>
  <line class="stroke" x1="120" y1="250" x2="150" y2="315"/>
  <text class="text" x="120" y="365" text-anchor="middle">Administrador</text>
  <text class="text-small" x="120" y="392" text-anchor="middle">General</text>

  <!-- Privilegios Administrativos -->
  <rect class="box" x="300" y="110" width="360" height="90"/>
  <text class="text" x="480" y="155" text-anchor="middle" dominant-baseline="middle">Privilegios Administrativos</text>

  <line class="arrow" x1="175" y1="150" x2="300" y2="155"/>

  <!-- Branches -->
  <text class="text" x="760" y="100">Crea nuevos usuarios</text>
  <line class="arrow" x1="660" y1="140" x2="730" y2="105"/>

  <text class="text" x="760" y="190">Configura parámetros / tipologías</text>
  <text class="text-small" x="760" y="218">(categorías, formas de pago, stock mínimo)</text>
  <line class="arrow" x1="660" y1="155" x2="730" y2="190"/>

  <text class="text" x="760" y="290">Gestiona empleados (RRHH)</text>
  <line class="arrow" x1="660" y1="175" x2="730" y2="285"/>

  <!-- Reportes Generales -->
  <rect class="box" x="300" y="300" width="560" height="110"/>
  <text class="text" x="580" y="350" text-anchor="middle" dominant-baseline="middle">Acceso a Reportes Generales y Métricas</text>
  <text class="text-small" x="580" y="382" text-anchor="middle" dominant-baseline="middle">(operativos y financieros, Web / App móvil)</text>

  <line class="arrow" x1="175" y1="235" x2="300" y2="345"/>
</svg>

