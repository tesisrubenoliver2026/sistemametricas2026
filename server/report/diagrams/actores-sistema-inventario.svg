<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <defs>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7bb8ff"/>
      <stop offset="100%" stop-color="#2b74c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0b2b4a" flood-opacity="0.35"/>
    </filter>
    <style>
      .box { fill: url(#boxGrad); stroke: #9fd0ff; stroke-width: 2; filter: url(#shadow); }
      .label { fill: #ffffff; font-family: "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 600; }
      .label-small { fill: #ffffff; font-family: "Segoe UI", Arial, sans-serif; font-size: 24px; font-weight: 600; }
      .line { stroke: #b7dcff; stroke-width: 4; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Left: Admin -->
  <rect class="box" x="40" y="140" width="260" height="86" rx="14" ry="14"/>
  <text class="label" x="170" y="195" text-anchor="middle" dominant-baseline="middle">Administrador</text>

  <!-- Middle: Operative users -->
  <rect class="box" x="360" y="140" width="310" height="86" rx="14" ry="14"/>
  <text class="label" x="515" y="195" text-anchor="middle" dominant-baseline="middle">Usuarios Operativos</text>

  <!-- Right: roles (2 columns) -->
  <rect class="box" x="740" y="60" width="210" height="72" rx="14" ry="14"/>
  <text class="label-small" x="845" y="96" text-anchor="middle" dominant-baseline="middle">Inventario</text>

  <rect class="box" x="980" y="60" width="210" height="72" rx="14" ry="14"/>
  <text class="label-small" x="1085" y="96" text-anchor="middle" dominant-baseline="middle">Ventas / Caja</text>

  <rect class="box" x="740" y="154" width="210" height="72" rx="14" ry="14"/>
  <text class="label-small" x="845" y="190" text-anchor="middle" dominant-baseline="middle">Compras</text>

  <rect class="box" x="980" y="154" width="210" height="72" rx="14" ry="14"/>
  <text class="label-small" x="1085" y="190" text-anchor="middle" dominant-baseline="middle">Finanzas</text>

  <rect class="box" x="740" y="248" width="450" height="72" rx="14" ry="14"/>
  <text class="label-small" x="965" y="284" text-anchor="middle" dominant-baseline="middle">RRHH (opcional)</text>

  <!-- Connections -->
  <line class="line" x1="300" y1="183" x2="360" y2="183"/>

  <!-- Branch point -->
  <line class="line" x1="670" y1="183" x2="710" y2="183"/>
  <line class="line" x1="710" y1="183" x2="710" y2="96"/>
  <line class="line" x1="710" y1="183" x2="710" y2="190"/>
  <line class="line" x1="710" y1="183" x2="710" y2="284"/>

  <!-- To boxes -->
  <line class="line" x1="710" y1="96" x2="740" y2="96"/>
  <line class="line" x1="710" y1="96" x2="980" y2="96"/>

  <line class="line" x1="710" y1="190" x2="740" y2="190"/>
  <line class="line" x1="710" y1="190" x2="980" y2="190"/>

  <line class="line" x1="710" y1="284" x2="740" y2="284"/>
</svg>

