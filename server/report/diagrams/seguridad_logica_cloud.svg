<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 18; }
      .title { font: 900 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #334155; }

      .group { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; rx: 18; }
      .groupTitle { font: 800 14px "Segoe UI", Arial, sans-serif; fill: #0f172a; }

      .card { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 14; }
      .cardA { fill: #ecfeff; stroke: #0ea5e9; stroke-width: 2; rx: 14; }
      .cardB { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 14; }
      .cardC { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 14; }
      .cardD { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; rx: 14; }

      .h { font: 900 13px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .p { font: 650 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .li { font: 650 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }

      .line { stroke: #0f172a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .dash { stroke-dasharray: 6 6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="780"/>
  <rect class="frame" x="30" y="30" width="1340" height="700"/>
  <text class="title" x="60" y="65">Medidas de seguridad lógica (Cloud/Internet) – sistema de ventas</text>
  <text class="subtitle" x="60" y="88">Resumen de controles: cifrado TLS, publicación segura con Cloudflare Tunnel, autenticación JWT, CORS, backups y monitoreo.</text>

  <!-- Groups -->
  <rect class="group" x="60" y="115" width="410" height="560"/>
  <text class="groupTitle" x="90" y="145">Cliente / Red</text>

  <rect class="group" x="495" y="115" width="410" height="560"/>
  <text class="groupTitle" x="525" y="145">Perímetro y servicios públicos</text>

  <rect class="group" x="930" y="115" width="410" height="560"/>
  <text class="groupTitle" x="960" y="145">Backend y datos</text>

  <!-- Left: Client/Network controls -->
  <rect class="card" x="95" y="175" width="340" height="135"/>
  <text class="h" x="115" y="205">Seguridad de acceso</text>
  <text class="p" x="115" y="228">- Wi‑Fi con contraseña / WPA2+ (si aplica)</text>
  <text class="p" x="115" y="248">- Gestión de dispositivos y antivirus</text>
  <text class="p" x="115" y="268">- Actualizaciones del SO / navegador</text>

  <rect class="card" x="95" y="330" width="340" height="155"/>
  <text class="h" x="115" y="360">Buenas prácticas operativas</text>
  <text class="p" x="115" y="383">- Uso de credenciales individuales</text>
  <text class="p" x="115" y="403">- Principio de mínimo privilegio</text>
  <text class="p" x="115" y="423">- Registro de actividad (auditoría)</text>
  <text class="p" x="115" y="443">- Política de contraseñas / rotación</text>

  <rect class="card" x="95" y="505" width="340" height="140"/>
  <text class="h" x="115" y="535">Transporte seguro</text>
  <text class="p" x="115" y="558">- HTTPS (TLS) para frontend y API</text>
  <text class="p" x="115" y="578">- Evita envío de datos en texto plano</text>
  <text class="p" x="115" y="598">- Control de orígenes (CORS)</text>

  <!-- Middle: Public perimeter -->
  <rect class="cardC" x="530" y="175" width="340" height="150"/>
  <text class="h" x="550" y="205">Cloudflare (perímetro)</text>
  <text class="p" x="550" y="228">- DNS + TLS (HTTPS)</text>
  <text class="p" x="550" y="248">- Cloudflare Tunnel (sin puertos expuestos)</text>
  <text class="p" x="550" y="268">- Mitigación DDoS / rate limiting (si aplica)</text>
  <text class="p" x="550" y="288">- Registro y monitoreo de tráfico</text>

  <rect class="cardC" x="530" y="345" width="340" height="120"/>
  <text class="h" x="550" y="375">Netlify (frontend)</text>
  <text class="p" x="550" y="398">- Hosting estático + CDN</text>
  <text class="p" x="550" y="418">- HTTPS por defecto</text>
  <text class="p" x="550" y="438">- Control de despliegues</text>

  <rect class="cardD" x="530" y="485" width="340" height="160"/>
  <text class="h" x="550" y="515">Gestión de identidades (aplicación)</text>
  <text class="p" x="550" y="538">- JWT en cookies / Bearer</text>
  <text class="p" x="550" y="558">- Roles y permisos (admin/funcionario)</text>
  <text class="p" x="550" y="578">- Protección contra acceso no autorizado</text>
  <text class="p" x="550" y="598">- Expiración / invalidación de sesión</text>

  <!-- Right: Backend/data controls -->
  <rect class="cardB" x="965" y="175" width="340" height="150"/>
  <text class="h" x="985" y="205">Backend (Node.js + Express)</text>
  <text class="p" x="985" y="228">- Validaciones de entrada</text>
  <text class="p" x="985" y="248">- Control de acceso por JWT</text>
  <text class="p" x="985" y="268">- CORS con orígenes permitidos</text>
  <text class="p" x="985" y="288">- Logs de errores / auditoría</text>

  <rect class="cardB" x="965" y="345" width="340" height="150"/>
  <text class="h" x="985" y="375">MySQL (datos)</text>
  <text class="p" x="985" y="398">- Usuarios/credenciales por ambiente</text>
  <text class="p" x="985" y="418">- Privilegios mínimos</text>
  <text class="p" x="985" y="438">- Respaldo y restauración</text>
  <text class="p" x="985" y="458">- Integridad: PK/FK/índices</text>

  <rect class="cardA" x="965" y="515" width="340" height="130"/>
  <text class="h" x="985" y="545">Ollama (IA local)</text>
  <text class="p" x="985" y="568">- Acceso restringido (solo backend)</text>
  <text class="p" x="985" y="588">- No expuesto públicamente</text>
  <text class="p" x="985" y="608">- Timeouts y manejo de errores</text>

  <!-- Data flows -->
  <path class="line" marker-end="url(#arrow)" d="M 435 575 L 530 575"/>
  <text class="label" x="482" y="565" text-anchor="middle" style="font:700 12px 'Segoe UI', Arial;">HTTPS</text>

  <path class="line" marker-end="url(#arrow)" d="M 870 250 L 965 250"/>
  <text class="label" x="918" y="240" text-anchor="middle" style="font:700 12px 'Segoe UI', Arial;">Tunnel → API</text>

  <path class="line dash" marker-end="url(#arrow)" d="M 870 405 L 965 405"/>
  <text class="label" x="918" y="395" text-anchor="middle" style="font:700 12px 'Segoe UI', Arial;">TLS/CDN</text>

  <path class="line" marker-end="url(#arrow)" d="M 1135 325 L 1135 345"/>
  <text class="label" x="1135" y="340" text-anchor="middle" style="font:700 12px 'Segoe UI', Arial;">SQL</text>

  <path class="line" marker-end="url(#arrow)" d="M 1135 495 L 1135 515"/>
  <text class="label" x="1135" y="510" text-anchor="middle" style="font:700 12px 'Segoe UI', Arial;">HTTP local</text>

  <!-- Footer -->
  <text class="footer" x="700" y="755" text-anchor="middle" style="font:600 12px 'Segoe UI', Arial; fill:#334155;">
    Figura X – Medidas de seguridad lógica del entorno (elaboración propia).
  </text>
</svg>

