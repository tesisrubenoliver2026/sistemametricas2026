<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 900 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .sub { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .legend { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .pct { font: 900 14px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .slice1 { fill: #3b82f6; }
      .slice2 { fill: #f97316; }
      .slice3 { fill: #9ca3af; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="620" />

  <text class="title" x="60" y="55">Gráfico 6 – ¿Cómo gestiona actualmente el control de inventario/stock?</text>
  <text class="sub" x="60" y="78">Pregunta 2 (respuesta única). N=30.</text>

  <!-- Pie chart -->
  <!-- Center (360,340), radius 190. -->
  <!-- Slice 1: 40% (12) from -90° to 54° -->
  <path class="slice1" d="M 360 340 L 360 150 A 190 190 0 0 1 472 494 Z" />
  <!-- Slice 2: 27% (8) from 54° to 150° -->
  <path class="slice2" d="M 360 340 L 472 494 A 190 190 0 0 1 196 435 Z" />
  <!-- Slice 3: 33% (10) from 150° to 270° -->
  <path class="slice3" d="M 360 340 L 196 435 A 190 190 0 0 1 360 150 Z" />

  <!-- Percent labels -->
  <text class="pct" x="468" y="306" text-anchor="middle">40%</text>
  <text class="pct" x="336" y="452" text-anchor="middle">27%</text>
  <text class="pct" x="261" y="283" text-anchor="middle">33%</text>

  <!-- Legend -->
  <rect class="box" x="650" y="165" width="470" height="170" />

  <rect class="slice1" x="675" y="195" width="18" height="18" rx="4" />
  <text class="legend" x="705" y="209">Planillas (Excel / Google Sheets) – 12</text>

  <rect class="slice2" x="675" y="235" width="18" height="18" rx="4" />
  <text class="legend" x="705" y="249">Registro manual (papel/cuaderno) – 8</text>

  <rect class="slice3" x="675" y="275" width="18" height="18" rx="4" />
  <text class="legend" x="705" y="289">Sin control formal (estimación) – 10</text>
</svg>

