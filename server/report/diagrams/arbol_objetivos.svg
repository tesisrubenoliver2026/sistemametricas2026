<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <style>
      .label { font: 600 18px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .boxText { font: 500 16px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .smallText { font: 500 14px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 10; }
      .line { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Headings -->
  <text x="60" y="60" class="label">Fines</text>
  <text x="600" y="440" class="label" text-anchor="middle">Objetivo principal</text>
  <text x="60" y="700" class="label">Medios</text>

  <!-- ===================== FINES (TOP) ===================== -->
  <!-- Left column -->
  <rect class="box" x="170" y="80" width="360" height="70" />
  <text x="350" y="112" class="boxText" text-anchor="middle">
    <tspan x="350" dy="0">Mejora de la eficiencia</tspan>
    <tspan x="350" dy="20">operativa</tspan>
  </text>

  <rect class="box" x="170" y="180" width="360" height="90" />
  <text x="350" y="215" class="boxText" text-anchor="middle">
    <tspan x="350" dy="0">Reducción del tiempo de</tspan>
    <tspan x="350" dy="20">registro y consulta</tspan>
  </text>

  <rect class="box" x="170" y="300" width="360" height="90" />
  <text x="350" y="335" class="boxText" text-anchor="middle">
    <tspan x="350" dy="0">Mayor productividad del</tspan>
    <tspan x="350" dy="20">personal operativo</tspan>
  </text>

  <!-- Right column -->
  <rect class="box" x="670" y="80" width="360" height="70" />
  <text x="850" y="112" class="boxText" text-anchor="middle">
    <tspan x="850" dy="0">Mejor soporte a la</tspan>
    <tspan x="850" dy="20">toma de decisiones</tspan>
  </text>

  <rect class="box" x="670" y="180" width="360" height="90" />
  <text x="850" y="215" class="boxText" text-anchor="middle">
    <tspan x="850" dy="0">Disponibilidad de métricas</tspan>
    <tspan x="850" dy="20">consolidadas</tspan>
  </text>

  <rect class="box" x="670" y="300" width="360" height="90" />
  <text x="850" y="335" class="boxText" text-anchor="middle">
    <tspan x="850" dy="0">Disminución de errores y</tspan>
    <tspan x="850" dy="20">mejor control financiero</tspan>
  </text>

  <!-- Side fins (horizontal outcomes) -->
  <rect class="box" x="20" y="300" width="140" height="90" />
  <text x="90" y="335" class="smallText" text-anchor="middle">
    <tspan x="90" dy="0">Mejor</tspan>
    <tspan x="90" dy="18">experiencia</tspan>
    <tspan x="90" dy="18">del usuario</tspan>
  </text>

  <rect class="box" x="1040" y="300" width="140" height="90" />
  <text x="1110" y="335" class="smallText" text-anchor="middle">
    <tspan x="1110" dy="0">Reportes</tspan>
    <tspan x="1110" dy="18">más</tspan>
    <tspan x="1110" dy="18">confiables</tspan>
  </text>

  <!-- Lines in fins -->
  <path class="line" d="M 350 150 L 350 180" />
  <path class="line" d="M 350 270 L 350 300" />
  <path class="line" d="M 850 150 L 850 180" />
  <path class="line" d="M 850 270 L 850 300" />
  <path class="line" d="M 160 345 L 170 345" />
  <path class="line" d="M 1030 345 L 1040 345" />

  <!-- Connector down to main objective -->
  <path class="line" d="M 350 410 L 850 410" />
  <path class="line" d="M 600 410 L 600 460" />

  <!-- ===================== OBJETIVO PRINCIPAL (MIDDLE) ===================== -->
  <rect class="box" x="260" y="470" width="680" height="95" />
  <text x="600" y="505" class="boxText" text-anchor="middle">
    <tspan x="600" dy="0">Implementar un sistema de gestión de ventas</tspan>
    <tspan x="600" dy="20">con control de inventario y caja, e integración</tspan>
    <tspan x="600" dy="20">de métricas asistidas por IA (Ollama)</tspan>
  </text>

  <!-- Three immediate objectives under main -->
  <path class="line" d="M 600 565 L 600 610" />
  <path class="line" d="M 250 610 L 950 610" />

  <rect class="box" x="90" y="630" width="320" height="85" />
  <text x="250" y="665" class="smallText" text-anchor="middle">
    <tspan x="250" dy="0">Automatizar el registro</tspan>
    <tspan x="250" dy="18">de ventas y compras</tspan>
  </text>
  <path class="line" d="M 250 610 L 250 630" />

  <rect class="box" x="440" y="630" width="320" height="85" />
  <text x="600" y="665" class="smallText" text-anchor="middle">
    <tspan x="600" dy="0">Centralizar información</tspan>
    <tspan x="600" dy="18">en MySQL con trazabilidad</tspan>
  </text>
  <path class="line" d="M 600 610 L 600 630" />

  <rect class="box" x="790" y="630" width="320" height="85" />
  <text x="950" y="665" class="smallText" text-anchor="middle">
    <tspan x="950" dy="0">Generar reportes y</tspan>
    <tspan x="950" dy="18">métricas interpretables</tspan>
  </text>
  <path class="line" d="M 950 610 L 950 630" />

  <!-- ===================== MEDIOS (BOTTOM) ===================== -->
  <!-- Connector from objective layer to medios -->
  <path class="line" d="M 600 715 L 600 760" />
  <path class="line" d="M 160 760 L 1040 760" />

  <!-- Medio 1 -->
  <rect class="box" x="60" y="785" width="340" height="70" />
  <text x="230" y="817" class="boxText" text-anchor="middle">
    <tspan x="230" dy="0">Backend + Base de datos</tspan>
  </text>
  <path class="line" d="M 230 760 L 230 785" />

  <rect class="box" x="60" y="875" width="340" height="80" />
  <text x="230" y="908" class="smallText" text-anchor="middle">
    <tspan x="230" dy="0">API REST con Node.js</tspan>
    <tspan x="230" dy="18">y Express</tspan>
  </text>
  <path class="line" d="M 230 855 L 230 875" />

  <rect class="box" x="60" y="975" width="340" height="95" />
  <text x="230" y="1010" class="smallText" text-anchor="middle">
    <tspan x="230" dy="0">Persistencia en MySQL</tspan>
    <tspan x="230" dy="18">con índices y relaciones</tspan>
  </text>
  <path class="line" d="M 230 955 L 230 975" />

  <!-- Medio 2 -->
  <rect class="box" x="430" y="785" width="340" height="70" />
  <text x="600" y="817" class="boxText" text-anchor="middle">
    <tspan x="600" dy="0">Cliente web + Despliegue</tspan>
  </text>
  <path class="line" d="M 600 760 L 600 785" />

  <rect class="box" x="430" y="875" width="340" height="80" />
  <text x="600" y="908" class="smallText" text-anchor="middle">
    <tspan x="600" dy="0">UI con Vite + React</tspan>
    <tspan x="600" dy="18">TypeScript (TSX)</tspan>
  </text>
  <path class="line" d="M 600 855 L 600 875" />

  <rect class="box" x="430" y="975" width="340" height="95" />
  <text x="600" y="1010" class="smallText" text-anchor="middle">
    <tspan x="600" dy="0">Publicación en Netlify</tspan>
    <tspan x="600" dy="18">y consumo seguro de API</tspan>
  </text>
  <path class="line" d="M 600 955 L 600 975" />

  <!-- Medio 3 -->
  <rect class="box" x="800" y="785" width="340" height="70" />
  <text x="970" y="817" class="boxText" text-anchor="middle">
    <tspan x="970" dy="0">IA + Movilidad + Soporte</tspan>
  </text>
  <path class="line" d="M 970 760 L 970 785" />

  <rect class="box" x="800" y="875" width="340" height="80" />
  <text x="970" y="908" class="smallText" text-anchor="middle">
    <tspan x="970" dy="0">Métricas con Ollama</tspan>
    <tspan x="970" dy="18">(snapshot + interpretación)</tspan>
  </text>
  <path class="line" d="M 970 855 L 970 875" />

  <rect class="box" x="800" y="975" width="340" height="95" />
  <text x="970" y="1010" class="smallText" text-anchor="middle">
    <tspan x="970" dy="0">App móvil (Expo) y</tspan>
    <tspan x="970" dy="18">publicación (EAS Build)</tspan>
  </text>
  <path class="line" d="M 970 955 L 970 975" />

  <!-- Footer note -->
  <text x="600" y="1165" class="smallText" text-anchor="middle" fill="#6b7280">
    <tspan>Árbol de objetivos (elaboración propia).</tspan>
  </text>
</svg>
