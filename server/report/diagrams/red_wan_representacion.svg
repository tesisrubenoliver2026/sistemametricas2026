<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .site { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 18; }
      .siteTitle { font: 800 14px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .node { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 14; }
      .cloud { fill: #ecfeff; stroke: #0ea5e9; stroke-width: 2; rx: 18; }
      .svc { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 18; }
      .srv { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 18; }
      .txt { font: 800 13px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .sub { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .line { stroke: #0f172a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .dash { stroke-dasharray: 7 7; }
      .label { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .footer { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="720" />

  <!-- Site A -->
  <rect class="site" x="40" y="40" width="380" height="520" />
  <text class="siteTitle" x="70" y="70">Sitio A (LAN)</text>

  <rect class="node" x="80" y="105" width="160" height="70" />
  <text class="txt" x="160" y="135" text-anchor="middle">PC A1</text>
  <text class="sub" x="160" y="155" text-anchor="middle">Web</text>

  <rect class="node" x="260" y="105" width="160" height="70" />
  <text class="txt" x="340" y="135" text-anchor="middle">PC A2</text>
  <text class="sub" x="340" y="155" text-anchor="middle">Web</text>

  <rect class="node" x="140" y="215" width="180" height="70" />
  <text class="txt" x="230" y="245" text-anchor="middle">Switch / AP</text>
  <text class="sub" x="230" y="265" text-anchor="middle">LAN</text>

  <rect class="node" x="150" y="315" width="160" height="70" />
  <text class="txt" x="230" y="345" text-anchor="middle">Router</text>
  <text class="sub" x="230" y="365" text-anchor="middle">Gateway</text>

  <!-- Site B -->
  <rect class="site" x="980" y="40" width="380" height="520" />
  <text class="siteTitle" x="1010" y="70">Sitio B (LAN / remoto)</text>

  <rect class="node" x="1020" y="105" width="160" height="70" />
  <text class="txt" x="1100" y="135" text-anchor="middle">PC B1</text>
  <text class="sub" x="1100" y="155" text-anchor="middle">Web</text>

  <rect class="node" x="1200" y="105" width="160" height="70" />
  <text class="txt" x="1280" y="135" text-anchor="middle">PC B2</text>
  <text class="sub" x="1280" y="155" text-anchor="middle">Web</text>

  <rect class="node" x="1090" y="215" width="180" height="70" />
  <text class="txt" x="1180" y="245" text-anchor="middle">Switch / AP</text>
  <text class="sub" x="1180" y="265" text-anchor="middle">LAN</text>

  <rect class="node" x="1100" y="315" width="160" height="70" />
  <text class="txt" x="1180" y="345" text-anchor="middle">Router</text>
  <text class="sub" x="1180" y="365" text-anchor="middle">Gateway</text>

  <!-- Internet cloud -->
  <rect class="cloud" x="560" y="260" width="280" height="110" />
  <text class="txt" x="700" y="298" text-anchor="middle">Internet (WAN)</text>
  <text class="sub" x="700" y="320" text-anchor="middle">ISP / TCP/IP</text>
  <text class="sub" x="700" y="342" text-anchor="middle">HTTPS</text>

  <!-- Public services -->
  <rect class="svc" x="520" y="420" width="360" height="110" />
  <text class="txt" x="700" y="456" text-anchor="middle">Servicios públicos</text>
  <text class="sub" x="700" y="478" text-anchor="middle">Netlify (Frontend) + Cloudflare (DNS/Tunnel)</text>
  <text class="sub" x="700" y="500" text-anchor="middle">Dominio backend (HTTPS)</text>

  <!-- Backend infra -->
  <rect class="srv" x="520" y="560" width="360" height="120" />
  <text class="txt" x="700" y="598" text-anchor="middle">Infraestructura Backend</text>
  <text class="sub" x="700" y="620" text-anchor="middle">Node.js + Express (API) · MySQL · Ollama</text>
  <text class="sub" x="700" y="642" text-anchor="middle">Acceso por Cloudflare Tunnel</text>

  <!-- Lines within sites -->
  <path class="line" marker-end="url(#arrow)" d="M 160 175 L 200 215" />
  <path class="line" marker-end="url(#arrow)" d="M 340 175 L 260 215" />
  <path class="line" marker-end="url(#arrow)" d="M 230 285 L 230 315" />

  <path class="line" marker-end="url(#arrow)" d="M 1100 175 L 1140 215" />
  <path class="line" marker-end="url(#arrow)" d="M 1280 175 L 1200 215" />
  <path class="line" marker-end="url(#arrow)" d="M 1180 285 L 1180 315" />

  <!-- WAN connections -->
  <path class="line dash" marker-end="url(#arrow)" d="M 230 385 L 230 470 L 560 470" />
  <path class="line dash" marker-end="url(#arrow)" d="M 1180 385 L 1180 470 L 840 470" />
  <text class="label" x="700" y="402" text-anchor="middle">WAN (HTTPS)</text>

  <!-- Internet -> services -> backend -->
  <path class="line" marker-end="url(#arrow)" d="M 700 370 L 700 420" />
  <path class="line" marker-end="url(#arrow)" d="M 700 530 L 700 560" />

  <!-- Footer -->
  <text class="footer" x="700" y="705" text-anchor="middle">Figura X – Representación gráfica de Red WAN para el acceso al sistema (elaboración propia).</text>
</svg>

