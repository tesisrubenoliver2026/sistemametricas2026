<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="980" viewBox="0 0 1300 980">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .lane { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; rx: 18; }
      .laneTitle { font: 800 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }

      .entity { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 14; }
      .proc { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 16; }
      .procAccent { fill: #111827; stroke: #111827; stroke-width: 2; rx: 16; }
      .store { fill: #ecfeff; stroke: #0ea5e9; stroke-width: 2; rx: 16; }
      .ai { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 16; }
      .out { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 16; }

      .t1 { font: 800 16px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .t1Inv { font: 800 16px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .t2 { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .t3 { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #334155; }

      .line { stroke: #0f172a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.92; }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1300" height="980" />

  <!-- Lanes -->
  <rect class="lane" x="40" y="40" width="1220" height="150" />
  <text x="70" y="75" class="laneTitle">Actores</text>

  <rect class="lane" x="40" y="210" width="1220" height="500" />
  <text x="70" y="245" class="laneTitle">Procesos (Nivel 2)</text>

  <rect class="lane" x="40" y="730" width="1220" height="210" />
  <text x="70" y="765" class="laneTitle">Almacenes / Servicios</text>

  <!-- ===================== ACTORES ===================== -->
  <rect class="entity" x="80" y="100" width="250" height="70" />
  <text x="205" y="128" class="t1" text-anchor="middle">
    <tspan x="205" dy="0">Administrador</tspan>
  </text>
  <text x="205" y="150" class="t2" text-anchor="middle">gestión y supervisión</text>

  <rect class="entity" x="360" y="100" width="250" height="70" />
  <text x="485" y="128" class="t1" text-anchor="middle">
    <tspan x="485" dy="0">Funcionario</tspan>
  </text>
  <text x="485" y="150" class="t2" text-anchor="middle">ventas / caja</text>

  <rect class="entity" x="640" y="100" width="250" height="70" />
  <text x="765" y="128" class="t1" text-anchor="middle">
    <tspan x="765" dy="0">Cliente Web</tspan>
  </text>
  <text x="765" y="150" class="t2" text-anchor="middle">Vite + React + TSX</text>

  <rect class="entity" x="920" y="100" width="250" height="70" />
  <text x="1045" y="128" class="t1" text-anchor="middle">
    <tspan x="1045" dy="0">Cliente Móvil</tspan>
  </text>
  <text x="1045" y="150" class="t2" text-anchor="middle">React Native + Expo</text>

  <!-- ===================== PROCESOS ===================== -->
  <!-- API REST as central orchestrator -->
  <rect class="procAccent" x="470" y="280" width="360" height="90" />
  <text x="650" y="312" class="t1Inv" text-anchor="middle">
    <tspan x="650" dy="0">API REST (Node.js + Express)</tspan>
  </text>
  <text x="650" y="338" class="t2" text-anchor="middle" fill="#d1d5db">
    <tspan x="650" dy="0">JWT · Validaciones · Ruteo de módulos</tspan>
  </text>

  <!-- Left-side modules -->
  <rect class="proc" x="120" y="260" width="280" height="95" />
  <text x="260" y="292" class="t1" text-anchor="middle">Autenticación</text>
  <text x="260" y="315" class="t2" text-anchor="middle">login / permisos / roles</text>

  <rect class="proc" x="120" y="380" width="280" height="115" />
  <text x="260" y="412" class="t1" text-anchor="middle">Gestión de catálogo</text>
  <text x="260" y="435" class="t2" text-anchor="middle">productos / categorías</text>
  <text x="260" y="456" class="t3" text-anchor="middle">altas · bajas · modificaciones</text>

  <rect class="proc" x="120" y="520" width="280" height="115" />
  <text x="260" y="552" class="t1" text-anchor="middle">Inventario</text>
  <text x="260" y="575" class="t2" text-anchor="middle">stock · lotes (si aplica)</text>
  <text x="260" y="596" class="t3" text-anchor="middle">consultas · ajustes · validaciones</text>

  <!-- Right-side modules -->
  <rect class="proc" x="900" y="260" width="280" height="115" />
  <text x="1040" y="292" class="t1" text-anchor="middle">Transacciones</text>
  <text x="1040" y="315" class="t2" text-anchor="middle">ventas / compras</text>
  <text x="1040" y="336" class="t3" text-anchor="middle">detalle · pagos · totales</text>

  <rect class="proc" x="900" y="400" width="280" height="115" />
  <text x="1040" y="432" class="t1" text-anchor="middle">Caja</text>
  <text x="1040" y="455" class="t2" text-anchor="middle">ingresos / egresos / arqueo</text>
  <text x="1040" y="476" class="t3" text-anchor="middle">apertura · cierre · conciliación</text>

  <rect class="out" x="900" y="540" width="280" height="95" />
  <text x="1040" y="572" class="t1" text-anchor="middle">Reportes</text>
  <text x="1040" y="595" class="t2" text-anchor="middle">PDF / consultas</text>

  <!-- AI module -->
  <rect class="ai" x="470" y="410" width="360" height="120" />
  <text x="650" y="442" class="t1" text-anchor="middle">Métricas asistidas por IA</text>
  <text x="650" y="465" class="t2" text-anchor="middle">snapshot (SQL agregadas)</text>
  <text x="650" y="486" class="t3" text-anchor="middle">interpretación en lenguaje natural</text>

  <!-- ===================== ALMACENES / SERVICIOS ===================== -->
  <rect class="store" x="120" y="800" width="320" height="110" />
  <text x="280" y="835" class="t1" text-anchor="middle">MySQL (Base de datos)</text>
  <text x="280" y="858" class="t2" text-anchor="middle">tablas: ventas, compras, productos, caja, etc.</text>
  <text x="280" y="880" class="t3" text-anchor="middle">integridad · índices · relaciones</text>

  <rect class="ai" x="490" y="800" width="320" height="110" />
  <text x="650" y="835" class="t1" text-anchor="middle">Ollama</text>
  <text x="650" y="858" class="t2" text-anchor="middle">LLM local</text>
  <text x="650" y="880" class="t3" text-anchor="middle">endpoint: /api/generate</text>

  <rect class="out" x="860" y="800" width="320" height="110" />
  <text x="1020" y="835" class="t1" text-anchor="middle">Salidas</text>
  <text x="1020" y="858" class="t2" text-anchor="middle">PDF / notificaciones (SMTP)</text>
  <text x="1020" y="880" class="t3" text-anchor="middle">descarga · impresión · envíos</text>

  <!-- ===================== FLUJOS (con flechas para claridad) ===================== -->
  <!-- Actors -> Auth/API -->
  <path class="line" marker-end="url(#arrow)" d="M 205 170 L 205 220 L 260 220 L 260 260" />
  <path class="line" marker-end="url(#arrow)" d="M 485 170 L 485 235 L 600 235 L 600 280" />
  <path class="line" marker-end="url(#arrow)" d="M 765 170 L 765 235 L 700 235 L 700 280" />
  <path class="line" marker-end="url(#arrow)" d="M 1045 170 L 1045 235 L 760 235 L 760 280" />

  <!-- Auth -> API -->
  <path class="line" marker-end="url(#arrow)" d="M 400 307 L 470 325" />

  <!-- API -> modules -->
  <path class="line" marker-end="url(#arrow)" d="M 470 340 L 400 430" />
  <path class="line" marker-end="url(#arrow)" d="M 830 340 L 900 318" />
  <path class="line" marker-end="url(#arrow)" d="M 830 352 L 900 458" />
  <path class="line" marker-end="url(#arrow)" d="M 830 362 L 900 587" />

  <!-- Catalog/Inventory <-> Transactions -->
  <path class="line" marker-end="url(#arrow)" d="M 400 437 L 470 437" />
  <path class="line" marker-end="url(#arrow)" d="M 830 480 L 900 480" />

  <!-- Inventory updates (transactions affect inventory) -->
  <path class="line" marker-end="url(#arrow)" d="M 900 318 L 830 520" />

  <!-- Metrics IA: snapshot from MySQL + response to API -->
  <path class="line" marker-end="url(#arrow)" d="M 650 530 L 650 800" />
  <path class="line" marker-end="url(#arrow)" d="M 650 800 L 650 530" opacity="0.0"/>

  <!-- API uses MySQL (CRUD) -->
  <path class="line" marker-end="url(#arrow)" d="M 600 370 L 600 760 L 280 760 L 280 800" />

  <!-- IA module calls Ollama -->
  <path class="line" marker-end="url(#arrow)" d="M 650 530 L 650 760 L 650 800" />
  <path class="line" marker-end="url(#arrow)" d="M 650 800 L 650 530" opacity="0.0"/>

  <!-- Reports from API / modules to outputs -->
  <path class="line" marker-end="url(#arrow)" d="M 1040 635 L 1040 800" />

  <!-- Footer -->
  <text x="650" y="965" class="t2" text-anchor="middle">Figura X – Diagrama de contexto. Nivel 2 (elaboración propia).</text>
</svg>

