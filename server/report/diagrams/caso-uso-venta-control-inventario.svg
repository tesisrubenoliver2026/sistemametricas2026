<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1500" viewBox="0 0 900 1500">
  <defs>
    <style>
      .shape { fill: #ffffff; stroke: #1f2937; stroke-width: 3; }
      .text { fill: #111827; font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 600; }
      .text-small { fill: #111827; font-family: "Segoe UI", Arial, sans-serif; font-size: 20px; font-weight: 600; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Helpers: center column -->
  <!-- X center = 360, box width = 420 -->

  <!-- Inicio (oval) -->
  <ellipse class="shape" cx="360" cy="70" rx="170" ry="40"/>
  <text class="text" x="360" y="70" text-anchor="middle" dominant-baseline="middle">Inicio</text>

  <!-- Login -->
  <rect class="shape" x="150" y="140" width="420" height="90" rx="12" ry="12"/>
  <text class="text" x="360" y="185" text-anchor="middle" dominant-baseline="middle">Inicio de sesión</text>
  <text class="text-small" x="360" y="213" text-anchor="middle" dominant-baseline="middle">(Web o App móvil)</text>

  <!-- Arrow -->
  <line class="arrow" x1="360" y1="110" x2="360" y2="140" marker-end="url(#arrowHead)"/>

  <!-- ¿Rol autorizado? (diamond) -->
  <polygon class="shape" points="360,280 470,340 360,400 250,340"/>
  <text class="text" x="360" y="338" text-anchor="middle" dominant-baseline="middle">¿Rol</text>
  <text class="text" x="360" y="365" text-anchor="middle" dominant-baseline="middle">autorizado?</text>

  <line class="arrow" x1="360" y1="230" x2="360" y2="280" marker-end="url(#arrowHead)"/>

  <!-- No -> Acceso denegado -->
  <rect class="shape" x="610" y="305" width="250" height="90" rx="12" ry="12"/>
  <text class="text-small" x="735" y="347" text-anchor="middle" dominant-baseline="middle">Acceso denegado</text>
  <text class="text-small" x="735" y="374" text-anchor="middle" dominant-baseline="middle">/ sin permisos</text>

  <line class="arrow" x1="470" y1="340" x2="610" y2="350" marker-end="url(#arrowHead)"/>
  <text class="text-small" x="520" y="320" text-anchor="middle">No</text>

  <!-- Yes -> Selección/Atención -->
  <rect class="shape" x="150" y="460" width="420" height="110" rx="12" ry="12"/>
  <text class="text" x="360" y="510" text-anchor="middle" dominant-baseline="middle">Atención al cliente</text>
  <text class="text-small" x="360" y="542" text-anchor="middle" dominant-baseline="middle">Selección de productos</text>

  <line class="arrow" x1="360" y1="400" x2="360" y2="460" marker-end="url(#arrowHead)"/>
  <text class="text-small" x="385" y="435" text-anchor="start">Sí</text>

  <!-- Consulta stock (diamond) -->
  <polygon class="shape" points="360,620 485,690 360,760 235,690"/>
  <text class="text" x="360" y="683" text-anchor="middle" dominant-baseline="middle">¿Hay stock</text>
  <text class="text" x="360" y="712" text-anchor="middle" dominant-baseline="middle">disponible?</text>

  <line class="arrow" x1="360" y1="570" x2="360" y2="620" marker-end="url(#arrowHead)"/>

  <!-- NO -> Alternativas -->
  <rect class="shape" x="610" y="645" width="250" height="110" rx="12" ry="12"/>
  <text class="text-small" x="735" y="690" text-anchor="middle" dominant-baseline="middle">Se ofrecen</text>
  <text class="text-small" x="735" y="717" text-anchor="middle" dominant-baseline="middle">alternativas</text>
  <text class="text-small" x="735" y="744" text-anchor="middle" dominant-baseline="middle">(sugerencias IA)</text>

  <line class="arrow" x1="485" y1="690" x2="610" y2="700" marker-end="url(#arrowHead)"/>
  <text class="text-small" x="525" y="670" text-anchor="middle">No</text>

  <!-- Acepta alternativa? -->
  <polygon class="shape" points="735,820 835,880 735,940 635,880"/>
  <text class="text-small" x="735" y="872" text-anchor="middle" dominant-baseline="middle">¿Acepta</text>
  <text class="text-small" x="735" y="900" text-anchor="middle" dominant-baseline="middle">alternativa?</text>

  <line class="arrow" x1="735" y1="755" x2="735" y2="820" marker-end="url(#arrowHead)"/>

  <!-- Yes from acepta -> Registrar venta -->
  <line class="arrow" x1="635" y1="880" x2="570" y2="880"/>
  <line class="arrow" x1="570" y1="880" x2="570" y2="835"/>
  <line class="arrow" x1="570" y1="835" x2="360" y2="835" marker-end="url(#arrowHead)"/>
  <text class="text-small" x="610" y="860" text-anchor="middle">Sí</text>

  <!-- No from acepta -> Fin (sin venta) -->
  <ellipse class="shape" cx="735" cy="1040" rx="170" ry="40"/>
  <text class="text" x="735" y="1040" text-anchor="middle" dominant-baseline="middle">Fin (sin venta)</text>
  <line class="arrow" x1="735" y1="940" x2="735" y2="1000" marker-end="url(#arrowHead)"/>
  <text class="text-small" x="760" y="970" text-anchor="start">No</text>

  <!-- YES from stock -> Registrar venta -->
  <rect class="shape" x="150" y="800" width="420" height="110" rx="12" ry="12"/>
  <text class="text" x="360" y="850" text-anchor="middle" dominant-baseline="middle">Registro de venta</text>
  <text class="text-small" x="360" y="882" text-anchor="middle" dominant-baseline="middle">(productos y pago)</text>

  <line class="arrow" x1="360" y1="760" x2="360" y2="800" marker-end="url(#arrowHead)"/>
  <text class="text-small" x="385" y="785" text-anchor="start">Sí</text>

  <!-- Actualización inventario/caja -->
  <rect class="shape" x="150" y="960" width="420" height="130" rx="12" ry="12"/>
  <text class="text" x="360" y="1010" text-anchor="middle" dominant-baseline="middle">Actualización automática</text>
  <text class="text-small" x="360" y="1042" text-anchor="middle" dominant-baseline="middle">de inventario y caja</text>
  <text class="text-small" x="360" y="1072" text-anchor="middle" dominant-baseline="middle">(trazabilidad)</text>

  <line class="arrow" x1="360" y1="910" x2="360" y2="960" marker-end="url(#arrowHead)"/>

  <!-- Reporte / Métricas -->
  <rect class="shape" x="150" y="1140" width="420" height="140" rx="12" ry="12"/>
  <text class="text" x="360" y="1195" text-anchor="middle" dominant-baseline="middle">Generación de</text>
  <text class="text-small" x="360" y="1227" text-anchor="middle" dominant-baseline="middle">comprobante y reporte</text>
  <text class="text-small" x="360" y="1257" text-anchor="middle" dominant-baseline="middle">Actualización de métricas</text>

  <line class="arrow" x1="360" y1="1090" x2="360" y2="1140" marker-end="url(#arrowHead)"/>

  <!-- Fin -->
  <ellipse class="shape" cx="360" cy="1410" rx="170" ry="40"/>
  <text class="text" x="360" y="1410" text-anchor="middle" dominant-baseline="middle">Fin</text>

  <line class="arrow" x1="360" y1="1280" x2="360" y2="1370" marker-end="url(#arrowHead)"/>
</svg>

