<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .frame { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 18; }
      .title { font: 800 18px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .node { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 14; }
      .node2 { fill: #ecfeff; stroke: #0ea5e9; stroke-width: 2; rx: 14; }
      .node3 { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 14; }
      .txt { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .sub { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .line { stroke: #0f172a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .dash { stroke-dasharray: 6 6; }
      .footer { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520" />

  <!-- Frame -->
  <rect class="frame" x="30" y="30" width="1140" height="430" />
  <text class="title" x="60" y="65">Representación gráfica de Red LAN (TCP/IP)</text>

  <!-- Clients -->
  <rect class="node" x="90" y="105" width="210" height="80" />
  <text class="txt" x="195" y="140" text-anchor="middle">PC Operador</text>
  <text class="sub" x="195" y="160" text-anchor="middle">Ventas / Caja (Web)</text>

  <rect class="node" x="330" y="105" width="210" height="80" />
  <text class="txt" x="435" y="140" text-anchor="middle">PC Admin</text>
  <text class="sub" x="435" y="160" text-anchor="middle">Gestión (Web)</text>

  <rect class="node" x="570" y="105" width="240" height="80" />
  <text class="txt" x="690" y="140" text-anchor="middle">Laptop / Soporte</text>
  <text class="sub" x="690" y="160" text-anchor="middle">Acceso interno</text>

  <rect class="node" x="840" y="105" width="240" height="80" />
  <text class="txt" x="960" y="140" text-anchor="middle">Dispositivo móvil</text>
  <text class="sub" x="960" y="160" text-anchor="middle">Wi‑Fi (Expo)</text>

  <!-- Switch/AP -->
  <rect class="node2" x="450" y="225" width="300" height="90" />
  <text class="txt" x="600" y="260" text-anchor="middle">Switch / Punto de acceso</text>
  <text class="sub" x="600" y="280" text-anchor="middle">Distribución LAN / Wi‑Fi</text>

  <!-- Router -->
  <rect class="node2" x="500" y="345" width="200" height="75" />
  <text class="txt" x="600" y="375" text-anchor="middle">Router / Gateway</text>
  <text class="sub" x="600" y="395" text-anchor="middle">Salida a ISP</text>

  <!-- Optional: local backend host (when deployed on-prem) -->
  <rect class="node3" x="90" y="225" width="320" height="90" />
  <text class="txt" x="250" y="260" text-anchor="middle">Servidor local (opcional)</text>
  <text class="sub" x="250" y="280" text-anchor="middle">Backend / MySQL / Ollama</text>

  <!-- Lines: clients -> switch -->
  <path class="line" d="M 195 185 L 195 210 L 520 210" />
  <path class="line" d="M 435 185 L 435 210 L 560 210" />
  <path class="line" d="M 690 185 L 690 210 L 680 210" />
  <path class="line" d="M 960 185 L 960 210 L 680 210" />
  <path class="line" d="M 520 210 L 520 225" />
  <path class="line" d="M 560 210 L 560 225" />
  <path class="line" d="M 680 210 L 680 225" />

  <!-- Switch -> Router -->
  <path class="line" d="M 600 315 L 600 345" />

  <!-- Local server -> switch -->
  <path class="line dash" d="M 410 270 L 450 270" />
  <text class="sub" x="430" y="258" text-anchor="middle">LAN</text>

  <!-- Footer -->
  <text class="footer" x="600" y="495" text-anchor="middle">Figura X – Representación gráfica de la Red LAN utilizada para acceder al sistema (elaboración propia).</text>
</svg>

