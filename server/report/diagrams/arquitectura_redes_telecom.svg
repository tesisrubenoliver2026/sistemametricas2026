<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .zone { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; rx: 18; }
      .zoneTitle { font: 800 16px "Segoe UI", Arial, sans-serif; fill: #0f172a; }

      .node { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 14; }
      .node2 { fill: #ecfeff; stroke: #0ea5e9; stroke-width: 2; rx: 14; }
      .node3 { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 14; }
      .node4 { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 14; }
      .nodeTitle { font: 800 14px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .nodeText { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #334155; }

      .line { stroke: #0f172a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .dash { stroke-dasharray: 6 6; }
      .label { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .footer { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900" />

  <!-- ===================== ZONES ===================== -->
  <rect class="zone" x="40" y="40" width="520" height="360" />
  <text class="zoneTitle" x="70" y="70">LAN interna (TCP/IP)</text>

  <rect class="zone" x="840" y="40" width="520" height="360" />
  <text class="zoneTitle" x="870" y="70">Conexiones remotas</text>

  <rect class="zone" x="40" y="430" width="1320" height="220" />
  <text class="zoneTitle" x="70" y="460">Internet / Servicios (HTTPS)</text>

  <rect class="zone" x="40" y="670" width="1320" height="190" />
  <text class="zoneTitle" x="70" y="700">Servidor backend (infraestructura)</text>

  <!-- ===================== LAN INTERNAL ===================== -->
  <rect class="node" x="80" y="100" width="180" height="80" />
  <text class="nodeTitle" x="170" y="130" text-anchor="middle">PC / Operador</text>
  <text class="nodeText" x="170" y="150" text-anchor="middle">Cliente Web / Escritorio</text>

  <rect class="node" x="300" y="100" width="200" height="80" />
  <text class="nodeTitle" x="400" y="130" text-anchor="middle">PC / Admin</text>
  <text class="nodeText" x="400" y="150" text-anchor="middle">Panel de administración</text>

  <rect class="node2" x="150" y="220" width="260" height="85" />
  <text class="nodeTitle" x="280" y="252" text-anchor="middle">Switch / Wi‑Fi</text>
  <text class="nodeText" x="280" y="272" text-anchor="middle">Red local</text>

  <rect class="node2" x="180" y="320" width="200" height="70" />
  <text class="nodeTitle" x="280" y="348" text-anchor="middle">Router / Gateway</text>
  <text class="nodeText" x="280" y="368" text-anchor="middle">Salida a ISP</text>

  <!-- LAN lines -->
  <path class="line" marker-end="url(#arrow)" d="M 170 180 L 220 220" />
  <path class="line" marker-end="url(#arrow)" d="M 400 180 L 340 220" />
  <path class="line" marker-end="url(#arrow)" d="M 280 305 L 280 320" />

  <!-- ===================== REMOTE ===================== -->
  <rect class="node" x="880" y="110" width="220" height="85" />
  <text class="nodeTitle" x="990" y="142" text-anchor="middle">Portátil</text>
  <text class="nodeText" x="990" y="162" text-anchor="middle">Acceso vía Wi‑Fi</text>

  <rect class="node" x="1130" y="110" width="200" height="85" />
  <text class="nodeTitle" x="1230" y="142" text-anchor="middle">Smartphone</text>
  <text class="nodeText" x="1230" y="162" text-anchor="middle">4G / Wi‑Fi (Expo)</text>

  <rect class="node2" x="920" y="220" width="200" height="70" />
  <text class="nodeTitle" x="1020" y="248" text-anchor="middle">Wi‑Fi / ISP</text>
  <text class="nodeText" x="1020" y="268" text-anchor="middle">Acceso a Internet</text>

  <rect class="node2" x="1140" y="220" width="180" height="70" />
  <text class="nodeTitle" x="1230" y="248" text-anchor="middle">Red móvil</text>
  <text class="nodeText" x="1230" y="268" text-anchor="middle">Operador 4G</text>

  <!-- Remote lines -->
  <path class="line" marker-end="url(#arrow)" d="M 990 195 L 1020 220" />
  <path class="line" marker-end="url(#arrow)" d="M 1230 195 L 1230 220" />

  <!-- ===================== INTERNET / SERVICES ===================== -->
  <rect class="node4" x="90" y="500" width="260" height="110" />
  <text class="nodeTitle" x="220" y="532" text-anchor="middle">Netlify</text>
  <text class="nodeText" x="220" y="552" text-anchor="middle">Frontend Web (Vite + TSX)</text>
  <text class="nodeText" x="220" y="572" text-anchor="middle">Hosting estático + CDN</text>

  <rect class="node4" x="410" y="500" width="300" height="110" />
  <text class="nodeTitle" x="560" y="532" text-anchor="middle">Cloudflare</text>
  <text class="nodeText" x="560" y="552" text-anchor="middle">DNS + Tunnel + TLS (HTTPS)</text>
  <text class="nodeText" x="560" y="572" text-anchor="middle">Dominio del backend</text>

  <rect class="node" x="770" y="500" width="540" height="110" />
  <text class="nodeTitle" x="1040" y="532" text-anchor="middle">Usuarios finales</text>
  <text class="nodeText" x="1040" y="552" text-anchor="middle">Navegador / App móvil consumen API</text>
  <text class="nodeText" x="1040" y="572" text-anchor="middle">HTTPS → Frontend (Netlify) y Backend (Cloudflare Tunnel)</text>

  <!-- Internet lines: LAN/Remote to services -->
  <path class="line dash" marker-end="url(#arrow)" d="M 280 390 L 280 470 L 220 470 L 220 500" />
  <text class="label" x="110" y="480">TCP/IP</text>

  <path class="line dash" marker-end="url(#arrow)" d="M 1020 290 L 1020 470 L 1040 470 L 1040 500" />
  <path class="line dash" marker-end="url(#arrow)" d="M 1230 290 L 1230 470 L 1040 470" />
  <text class="label" x="1120" y="480">Wi‑Fi / 4G</text>

  <!-- Frontend → Backend -->
  <path class="line" marker-end="url(#arrow)" d="M 350 555 L 410 555" />
  <text class="label" x="380" y="544" text-anchor="middle">API calls (HTTPS)</text>

  <!-- ===================== BACKEND INFRA ===================== -->
  <rect class="node3" x="140" y="735" width="420" height="105" />
  <text class="nodeTitle" x="350" y="767" text-anchor="middle">Servidor Backend</text>
  <text class="nodeText" x="350" y="787" text-anchor="middle">Node.js + Express (API REST)</text>
  <text class="nodeText" x="350" y="807" text-anchor="middle">Expuesto vía Cloudflare Tunnel</text>

  <rect class="node3" x="610" y="735" width="300" height="105" />
  <text class="nodeTitle" x="760" y="767" text-anchor="middle">MySQL</text>
  <text class="nodeText" x="760" y="787" text-anchor="middle">Base de datos del sistema</text>
  <text class="nodeText" x="760" y="807" text-anchor="middle">Consultas CRUD / agregadas</text>

  <rect class="node3" x="950" y="735" width="340" height="105" />
  <text class="nodeTitle" x="1120" y="767" text-anchor="middle">Ollama (IA)</text>
  <text class="nodeText" x="1120" y="787" text-anchor="middle">Servicio local (LLM)</text>
  <text class="nodeText" x="1120" y="807" text-anchor="middle">Interpretación de métricas</text>

  <!-- Cloudflare Tunnel → Backend -->
  <path class="line" marker-end="url(#arrow)" d="M 560 610 L 560 700 L 350 700 L 350 735" />
  <text class="label" x="510" y="690" text-anchor="middle">Tunnel (HTTPS)</text>

  <!-- Backend ↔ MySQL -->
  <path class="line" marker-end="url(#arrow)" d="M 560 787 L 610 787" />
  <path class="line" marker-end="url(#arrow)" d="M 610 807 L 560 807" opacity="0.0"/>
  <text class="label" x="585" y="776" text-anchor="middle">SQL</text>

  <!-- Backend ↔ Ollama -->
  <!-- Routed below MySQL to avoid overlapping the DB box -->
  <path class="line" marker-end="url(#arrow)" d="M 560 807 L 560 860 L 950 860 L 950 807" />
  <text class="label" x="755" y="852" text-anchor="middle">HTTP local</text>

  <!-- Footer -->
  <text class="footer" x="700" y="880" text-anchor="middle">Figura X – Arquitectura de red y telecomunicaciones (elaboración propia).</text>
</svg>
