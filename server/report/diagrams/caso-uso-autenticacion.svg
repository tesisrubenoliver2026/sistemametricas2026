<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <style>
      .stroke { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 3; rx: 14; ry: 14; }
      .text { fill: #111827; font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 600; }
      .text-small { fill: #111827; font-family: "Segoe UI", Arial, sans-serif; font-size: 20px; font-weight: 600; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Actor: Usuario -->
  <circle class="stroke" cx="110" cy="120" r="24"/>
  <line class="stroke" x1="110" y1="144" x2="110" y2="220"/>
  <line class="stroke" x1="70" y1="170" x2="150" y2="170"/>
  <line class="stroke" x1="110" y1="220" x2="80" y2="280"/>
  <line class="stroke" x1="110" y1="220" x2="140" y2="280"/>
  <text class="text" x="110" y="320" text-anchor="middle">Usuario</text>
  <text class="text-small" x="110" y="348" text-anchor="middle">(Web / App)</text>

  <!-- Step 1 -->
  <rect class="box" x="250" y="70" width="360" height="110"/>
  <text class="text" x="430" y="118" text-anchor="middle" dominant-baseline="middle">
    Se autentica con su
  </text>
  <text class="text" x="430" y="148" text-anchor="middle" dominant-baseline="middle">
    usuario y contraseña
  </text>

  <line class="arrow" x1="160" y1="150" x2="250" y2="125"/>

  <!-- Step 2 -->
  <rect class="box" x="250" y="240" width="360" height="120"/>
  <text class="text" x="430" y="292" text-anchor="middle" dominant-baseline="middle">
    Se valida la información
  </text>
  <text class="text-small" x="430" y="324" text-anchor="middle" dominant-baseline="middle">
    (roles, JWT/cookies)
  </text>

  <line class="arrow" x1="430" y1="180" x2="430" y2="240"/>

  <!-- Success -->
  <rect class="box" x="700" y="70" width="350" height="140"/>
  <text class="text" x="875" y="120" text-anchor="middle" dominant-baseline="middle">
    Ingresa satisfactoriamente
  </text>
  <text class="text-small" x="875" y="152" text-anchor="middle" dominant-baseline="middle">
    y visualiza opciones
  </text>
  <text class="text-small" x="875" y="184" text-anchor="middle" dominant-baseline="middle">
    según su rol
  </text>

  <line class="arrow" x1="610" y1="275" x2="700" y2="150"/>
  <text class="text-small" x="655" y="205" text-anchor="middle">Sí</text>

  <!-- Failure -->
  <rect class="box" x="700" y="270" width="350" height="140"/>
  <text class="text" x="875" y="320" text-anchor="middle" dominant-baseline="middle">
    No ingresa
  </text>
  <text class="text-small" x="875" y="352" text-anchor="middle" dominant-baseline="middle">
    (credenciales inválidas
  </text>
  <text class="text-small" x="875" y="384" text-anchor="middle" dominant-baseline="middle">
    o sin permisos)
  </text>

  <line class="arrow" x1="610" y1="325" x2="700" y2="340"/>
  <text class="text-small" x="655" y="312" text-anchor="middle">No</text>
</svg>

