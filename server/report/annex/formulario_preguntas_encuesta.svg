<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="794" height="1123" viewBox="0 0 794 1123">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .frame { fill: none; stroke: #0f172a; stroke-width: 1.2; }
      .h1 { font: 900 20px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .h2 { font: 800 13px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .p  { font: 500 12px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .muted { font: 500 11px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .line { stroke: #cbd5e1; stroke-width: 1; }
      .card { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.2; rx: 14; }
      .qtitle { font: 800 12.5px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .opt { font: 600 12px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 1.2; rx: 2; }
      .radio { fill: #ffffff; stroke: #0f172a; stroke-width: 1.2; }
      .tag { fill: #0ea5e9; rx: 10; }
      .tagText { font: 800 10.5px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <!-- Page -->
  <rect class="page" x="0" y="0" width="794" height="1123" />
  <rect class="frame" x="22" y="22" width="750" height="1079" rx="18" />

  <!-- Header -->
  <text class="h1" x="44" y="70">Anexo A – Formulario de encuesta (preguntas aplicadas)</text>
  <text class="p" x="44" y="96">
    Sistema web de ventas e inventario con soporte de IA (Ollama) para análisis e interpretación de métricas.
  </text>

  <!-- Meta -->
  <rect class="card" x="44" y="116" width="706" height="92" />
  <text class="h2" x="64" y="142">Datos generales (opcional)</text>
  <line class="line" x1="64" y1="152" x2="730" y2="152" />

  <text class="p" x="64" y="176">Fecha:</text>
  <line class="line" x1="110" y1="179" x2="260" y2="179" />
  <text class="p" x="294" y="176">Cargo/rol:</text>
  <line class="line" x1="365" y1="179" x2="560" y2="179" />
  <text class="p" x="586" y="176">Área:</text>
  <line class="line" x1="623" y1="179" x2="730" y2="179" />

  <text class="p" x="64" y="198">Nombre (opcional):</text>
  <line class="line" x1="170" y1="201" x2="730" y2="201" />

  <!-- Instructions -->
  <text class="muted" x="44" y="236">Instrucciones: marque (✓) la opción correspondiente. En preguntas de selección múltiple, puede marcar más de una opción.</text>

  <!-- Q1 -->
  <rect class="card" x="44" y="254" width="706" height="286" />
  <rect class="tag" x="64" y="272" width="112" height="22" />
  <text class="tagText" x="120" y="287" text-anchor="middle">Selección múltiple</text>
  <text class="qtitle" x="64" y="314">
    1) ¿Qué beneficios espera obtener al integrar IA (Ollama) para métricas y apoyo a decisiones?
  </text>

  <!-- Options Q1 -->
  <rect class="box" x="66" y="334" width="14" height="14" />
  <text class="opt" x="90" y="346">Interpretación de métricas en lenguaje natural</text>

  <rect class="box" x="66" y="362" width="14" height="14" />
  <text class="opt" x="90" y="374">Reducción del tiempo de análisis y consultas</text>

  <rect class="box" x="66" y="390" width="14" height="14" />
  <text class="opt" x="90" y="402">Identificación de tendencias/variaciones (ventas, compras, inventario)</text>

  <rect class="box" x="66" y="418" width="14" height="14" />
  <text class="opt" x="90" y="430">Recomendaciones para decisiones operativas (stock, caja, ventas)</text>

  <rect class="box" x="66" y="446" width="14" height="14" />
  <text class="opt" x="90" y="458">Indicadores consolidados más claros (dashboard)</text>

  <rect class="box" x="66" y="474" width="14" height="14" />
  <text class="opt" x="90" y="486">Menos errores de interpretación / mejor comprensión</text>

  <text class="muted" x="64" y="516">Observación (opcional):</text>
  <line class="line" x1="64" y1="528" x2="730" y2="528" />

  <!-- Q2 -->
  <rect class="card" x="44" y="560" width="706" height="206" />
  <rect class="tag" x="64" y="578" width="88" height="22" />
  <text class="tagText" x="108" y="593" text-anchor="middle">Opción única</text>
  <text class="qtitle" x="64" y="620">2) ¿Cómo gestiona actualmente el control de inventarios en su organización?</text>

  <circle class="radio" cx="74" cy="646" r="7" />
  <text class="opt" x="90" y="650">Manualmente (registro en papel)</text>

  <circle class="radio" cx="74" cy="676" r="7" />
  <text class="opt" x="90" y="680">Software básico (Excel, Google Sheets)</text>

  <circle class="radio" cx="74" cy="706" r="7" />
  <text class="opt" x="90" y="710">No se cuenta con un sistema formal de control de inventarios</text>

  <text class="muted" x="64" y="742">Comentario (opcional):</text>
  <line class="line" x1="64" y1="754" x2="730" y2="754" />

  <!-- Q3 -->
  <rect class="card" x="44" y="786" width="706" height="210" />
  <rect class="tag" x="64" y="804" width="88" height="22" />
  <text class="tagText" x="108" y="819" text-anchor="middle">Opción única</text>
  <text class="qtitle" x="64" y="846">3) ¿Considera necesaria la digitalización del proceso actual de ventas e inventario mediante un sistema web integrado?</text>

  <circle class="radio" cx="74" cy="874" r="7" />
  <text class="opt" x="90" y="878">Sí</text>

  <circle class="radio" cx="74" cy="904" r="7" />
  <text class="opt" x="90" y="908">No</text>

  <circle class="radio" cx="74" cy="934" r="7" />
  <text class="opt" x="90" y="938">Sí, parcialmente</text>

  <text class="muted" x="64" y="972">Comentario (opcional):</text>
  <line class="line" x1="64" y1="984" x2="730" y2="984" />

  <!-- Footer -->
  <line class="line" x1="44" y1="1038" x2="750" y2="1038" />
  <text class="muted" x="44" y="1060">Nota: Este formulario corresponde a las preguntas utilizadas para el levantamiento de datos presentado en el marco analítico.</text>
  <text class="muted" x="750" y="1060" text-anchor="end">Página 1/1</text>
</svg>

