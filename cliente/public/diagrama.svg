<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" height="820" font-family="Arial, sans-serif" font-size="11">

  <!-- ===== FONDO ===== -->
  <rect width="1100" height="820" fill="#fafafa" rx="8"/>

  <!-- ===== SECCIÓN ACTORES ===== -->
  <rect x="20" y="15" width="1060" height="120" fill="none" stroke="#999" stroke-width="1" rx="6" stroke-dasharray="4,3"/>
  <text x="35" y="33" font-size="12" fill="#555" font-weight="bold">Actores</text>

  <!-- Administrador -->
  <rect x="60" y="45" width="160" height="70" fill="white" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="140" y="76" text-anchor="middle" font-weight="bold" fill="#222">Administrador</text>
  <text x="140" y="93" text-anchor="middle" fill="#555">gestión y supervisión</text>

  <!-- Funcionario -->
  <rect x="310" y="45" width="160" height="70" fill="white" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="390" y="76" text-anchor="middle" font-weight="bold" fill="#222">Funcionario</text>
  <text x="390" y="93" text-anchor="middle" fill="#555">ventas / caja</text>

  <!-- Cliente Web -->
  <rect x="590" y="45" width="160" height="70" fill="white" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="670" y="76" text-anchor="middle" font-weight="bold" fill="#222">Cliente Web</text>
  <text x="670" y="93" text-anchor="middle" fill="#555">Vite + React + TSX</text>

  <!-- Cliente Móvil -->
  <rect x="860" y="45" width="180" height="70" fill="white" stroke="#333" stroke-width="1.5" rx="3"/>
  <text x="950" y="76" text-anchor="middle" font-weight="bold" fill="#222">Cliente Móvil</text>
  <text x="950" y="93" text-anchor="middle" fill="#555">React Native + Expo</text>

  <!-- ===== SECCIÓN PROCESOS ===== -->
  <rect x="20" y="155" width="1060" height="470" fill="none" stroke="#999" stroke-width="1" rx="6" stroke-dasharray="4,3"/>
  <text x="35" y="173" font-size="12" fill="#555" font-weight="bold">Procesos (Nivel 2)</text>

  <!-- Flechas actores -> API (centro) -->
  <line x1="140" y1="115" x2="530" y2="255" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="390" y1="115" x2="530" y2="255" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="670" y1="115" x2="580" y2="255" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="950" y1="115" x2="600" y2="255" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- PROCESO: API REST (centro, círculo grande destacado) -->
  <circle cx="555" cy="300" r="68" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="2"/>
  <text x="555" y="292" text-anchor="middle" fill="white" font-weight="bold" font-size="12">API REST</text>
  <text x="555" y="308" text-anchor="middle" fill="#aaa" font-size="10">Node.js + Express</text>
  <text x="555" y="322" text-anchor="middle" fill="#666" font-size="9">JWT · Validaciones · Ruteo</text>

  <!-- PROCESO: Autenticación (círculo) -->
  <circle cx="160" cy="255" r="55" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="249" text-anchor="middle" font-weight="bold" fill="#222">Autenticación</text>
  <text x="160" y="264" text-anchor="middle" fill="#555" font-size="10">login / permisos / roles</text>

  <!-- PROCESO: Gestión catálogo (círculo) -->
  <circle cx="160" cy="390" r="55" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="382" text-anchor="middle" font-weight="bold" fill="#222">Gestión de</text>
  <text x="160" y="396" text-anchor="middle" font-weight="bold" fill="#222">catálogo</text>
  <text x="160" y="410" text-anchor="middle" fill="#555" font-size="9">productos / categorías</text>

  <!-- PROCESO: Inventario (círculo) -->
  <circle cx="160" cy="510" r="55" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="504" text-anchor="middle" font-weight="bold" fill="#222">Inventario</text>
  <text x="160" y="518" text-anchor="middle" fill="#555" font-size="9">stock · lotes · ajustes</text>

  <!-- PROCESO: Métricas IA (círculo, borde verde) -->
  <circle cx="555" cy="460" r="55" fill="white" stroke="#22c55e" stroke-width="2"/>
  <text x="555" y="452" text-anchor="middle" font-weight="bold" fill="#222">Métricas IA</text>
  <text x="555" y="466" text-anchor="middle" fill="#555" font-size="9">snapshot SQL agregadas</text>
  <text x="555" y="479" text-anchor="middle" fill="#555" font-size="9">lenguaje natural</text>

  <!-- PROCESO: Transacciones (círculo) -->
  <circle cx="890" cy="255" r="55" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="890" y="247" text-anchor="middle" font-weight="bold" fill="#222">Transacciones</text>
  <text x="890" y="261" text-anchor="middle" fill="#555" font-size="9">ventas / compras</text>
  <text x="890" y="274" text-anchor="middle" fill="#555" font-size="9">detalle · pagos · totales</text>

  <!-- PROCESO: Caja (círculo) -->
  <circle cx="890" cy="390" r="55" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="890" y="384" text-anchor="middle" font-weight="bold" fill="#222">Caja</text>
  <text x="890" y="398" text-anchor="middle" fill="#555" font-size="9">ingresos · egresos · arqueo</text>
  <text x="890" y="411" text-anchor="middle" fill="#555" font-size="9">apertura · cierre</text>

  <!-- PROCESO: Reportes (círculo, borde naranja) -->
  <circle cx="890" cy="510" r="55" fill="#fff8f0" stroke="#f97316" stroke-width="2"/>
  <text x="890" y="504" text-anchor="middle" font-weight="bold" fill="#222">Reportes</text>
  <text x="890" y="518" text-anchor="middle" fill="#555" font-size="9">PDF / consultas</text>

  <!-- Flechas API <-> procesos laterales izquierda -->
  <line x1="487" y1="275" x2="215" y2="256" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="487" y1="295" x2="215" y2="385" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="487" y1="310" x2="215" y2="500" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Flechas API <-> procesos laterales derecha -->
  <line x1="623" y1="275" x2="835" y2="256" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="623" y1="295" x2="835" y2="380" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="623" y1="310" x2="835" y2="495" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Flechas API <-> Métricas IA -->
  <line x1="555" y1="368" x2="555" y2="405" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)" marker-start="url(#arrowGreenR)"/>

  <!-- Flechas Métricas IA -> Almacenes -->
  <line x1="510" y1="490" x2="300" y2="685" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <line x1="555" y1="515" x2="555" y2="685" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrowGreen)"/>

  <!-- Flechas Reportes -> Salidas -->
  <line x1="890" y1="565" x2="820" y2="685" stroke="#f97316" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

  <!-- ===== SECCIÓN ALMACENES ===== -->
  <rect x="20" y="660" width="1060" height="140" fill="none" stroke="#999" stroke-width="1" rx="6" stroke-dasharray="4,3"/>
  <text x="35" y="678" font-size="12" fill="#555" font-weight="bold">Almacenes / Servicios</text>

  <!-- MySQL - rectángulo doble línea superior (azul) -->
  <rect x="50" y="688" width="260" height="90" fill="white" stroke="#3b82f6" stroke-width="1.5" rx="3"/>
  <line x1="50" y1="694" x2="310" y2="694" stroke="#3b82f6" stroke-width="3"/>
  <text x="180" y="718" text-anchor="middle" font-weight="bold" fill="#1d4ed8">MySQL (Base de datos)</text>
  <text x="180" y="735" text-anchor="middle" fill="#555" font-size="10">tablas: ventas, compras, productos, caja</text>
  <text x="180" y="750" text-anchor="middle" fill="#555" font-size="10">integridad · índices · relaciones</text>

  <!-- Ollama - rectángulo doble línea superior (verde) -->
  <rect x="410" y="688" width="260" height="90" fill="white" stroke="#22c55e" stroke-width="1.5" rx="3"/>
  <line x1="410" y1="694" x2="670" y2="694" stroke="#22c55e" stroke-width="3"/>
  <text x="540" y="718" text-anchor="middle" font-weight="bold" fill="#15803d">Ollama</text>
  <text x="540" y="735" text-anchor="middle" fill="#555" font-size="10">LLM local</text>
  <text x="540" y="750" text-anchor="middle" fill="#555" font-size="10">endpoint: /api/generate</text>

  <!-- Salidas - rectángulo doble línea superior (naranja) -->
  <rect x="770" y="688" width="280" height="90" fill="white" stroke="#f97316" stroke-width="1.5" rx="3"/>
  <line x1="770" y1="694" x2="1050" y2="694" stroke="#f97316" stroke-width="3"/>
  <text x="910" y="718" text-anchor="middle" font-weight="bold" fill="#c2410c">Salidas</text>
  <text x="910" y="735" text-anchor="middle" fill="#555" font-size="10">PDF / notificaciones (SMTP)</text>
  <text x="910" y="750" text-anchor="middle" fill="#555" font-size="10">descarga · impresión · envíos</text>

  <!-- Flecha API -> MySQL -->
  <line x1="490" y1="340" x2="200" y2="688" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Definición de marcadores de flecha -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowGreenR" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>

</svg>
